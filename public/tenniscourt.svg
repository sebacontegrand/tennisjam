<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Court background -->
  <rect width="600" height="800" fill="#1a5f2a"/>
  
  <!-- Main court boundary -->
  <rect x="50" y="50" width="500" height="700" fill="none" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Center service line (vertical) -->
  <line x1="300" y1="50" x2="300" y2="750" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Net line (horizontal) -->
  <line x1="50" y1="400" x2="550" y2="400" stroke="#facc15" stroke-width="4"/>
  
  <!-- Baseline (top) -->
  <line x1="50" y1="50" x2="550" y2="50" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Baseline (bottom) -->
  <line x1="50" y1="750" x2="550" y2="750" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Service box lines (top side) -->
  <!-- Service box left side top -->
  <line x1="50" y1="150" x2="300" y2="150" stroke="#ffffff" stroke-width="2"/>
  <!-- Service box divider top -->
  <line x1="300" y1="50" x2="300" y2="150" stroke="#ffffff" stroke-width="2"/>
  <!-- Service box left -->
  <rect x="50" y="50" width="250" height="100" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Service box right -->
  <rect x="300" y="50" width="250" height="100" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
  <!-- Service box lines (bottom side) -->
  <!-- Service box left side bottom -->
  <line x1="50" y1="650" x2="300" y2="650" stroke="#ffffff" stroke-width="2"/>
  <!-- Service box divider bottom -->
  <line x1="300" y1="650" x2="300" y2="750" stroke="#ffffff" stroke-width="2"/>
  <!-- Service box left -->
  <rect x="50" y="650" width="250" height="100" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Service box right -->
  <rect x="300" y="650" width="250" height="100" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
  <!-- Service area highlights -->
  <!-- Top service area - LEFT -->
  <rect x="50" y="50" width="250" height="100" fill="#4ade80" opacity="0.1" stroke="none"/>
  <!-- Top service area - RIGHT (T) -->
  <rect x="300" y="50" width="250" height="100" fill="#60a5fa" opacity="0.1" stroke="none"/>
  
  <!-- Bottom service area - LEFT -->
  <rect x="50" y="650" width="250" height="100" fill="#4ade80" opacity="0.1" stroke="none"/>
  <!-- Bottom service area - RIGHT (T) -->
  <rect x="300" y="650" width="250" height="100" fill="#60a5fa" opacity="0.1" stroke="none"/>
  
  <!-- Side box (Wide serve area) - Top -->
  <rect x="50" y="150" width="75" height="250" fill="#4ade80" opacity="0.08" stroke="none"/>
  <line x1="125" y1="150" x2="125" y2="400" stroke="#ffffff" stroke-width="1" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Side box (Wide serve area) - Bottom -->
  <rect x="50" y="400" width="75" height="250" fill="#4ade80" opacity="0.08" stroke="none"/>
  <line x1="125" y1="400" x2="125" y2="650" stroke="#ffffff" stroke-width="1" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Side box (Wide serve area) - Top Right -->
  <rect x="475" y="150" width="75" height="250" fill="#4ade80" opacity="0.08" stroke="none"/>
  <line x1="475" y1="150" x2="475" y2="400" stroke="#ffffff" stroke-width="1" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Side box (Wide serve area) - Bottom Right -->
  <rect x="475" y="400" width="75" height="250" fill="#4ade80" opacity="0.08" stroke="none"/>
  <line x1="475" y1="400" x2="475" y2="650" stroke="#ffffff" stroke-width="1" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Zone labels -->
  <!-- Top left (Wide) -->
  <text x="100" y="110" font-size="14" font-weight="bold" fill="#4ade80" opacity="0.6" text-anchor="middle">WIDE</text>
  <!-- Top center (Body/Center) -->
  <text x="200" y="110" font-size="12" font-weight="bold" fill="#facc15" opacity="0.5" text-anchor="middle">BODY</text>
  <!-- Top right (T) -->
  <text x="400" y="110" font-size="12" font-weight="bold" fill="#facc15" opacity="0.5" text-anchor="middle">T</text>
  <text x="500" y="110" font-size="12" font-weight="bold" fill="#4ade80" opacity="0.6" text-anchor="middle">WIDE</text>
  
  <!-- Bottom left (Wide) -->
  <text x="100" y="720" font-size="14" font-weight="bold" fill="#4ade80" opacity="0.6" text-anchor="middle">WIDE</text>
  <!-- Bottom center (Body/Center) -->
  <text x="200" y="720" font-size="12" font-weight="bold" fill="#facc15" opacity="0.5" text-anchor="middle">BODY</text>
  <!-- Bottom right (T) -->
  <text x="400" y="720" font-size="12" font-weight="bold" fill="#facc15" opacity="0.5" text-anchor="middle">T</text>
  <text x="500" y="720" font-size="12" font-weight="bold" fill="#4ade80" opacity="0.6" text-anchor="middle">WIDE</text>
  
  <!-- Service Area Labels -->
  <text x="175" y="105" font-size="18" font-weight="bold" fill="#ffffff" opacity="0.7" text-anchor="middle">SERVICE</text>
  <text x="175" y="125" font-size="18" font-weight="bold" fill="#ffffff" opacity="0.7" text-anchor="middle">AREA</text>
  
  <!-- Court name -->
  <text x="300" y="800" font-size="16" font-weight="bold" fill="#ffffff" opacity="0.5" text-anchor="middle">TENNIS COURT - SERVE ZONES</text>
</svg>